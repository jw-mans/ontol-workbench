x-backend-env: &backend-env
  DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-ontol}:${POSTGRES_PASSWORD:-ontol}@db:5432/${POSTGRES_DB:-ontol}
  PLANTUML_URL: http://plantuml:8080/png/
  REDIS_URL: redis://redis:6379/0
  SECRET: ${SECRET:?set SECRET in v2-service/.env}
  CORS_ORIGINS: ${CORS_ORIGINS:-["http://localhost:5173"]}

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ontol}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ontol}
      POSTGRES_DB: ${POSTGRES_DB:-ontol}
    ports:
      - '5433:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-ontol}']
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  plantuml:
    image: plantuml/plantuml-server:jetty
    ports:
      - '8080:8080'

  api:
    image: ontol-api
    build:
      context: ..
      dockerfile: v2-service/backend/Dockerfile
    environment:
      <<: *backend-env
      WEB_CONCURRENCY: ${WEB_CONCURRENCY:-2}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      plantuml:
        condition: service_started
    ports:
      - '8000:8000'

  worker:
    image: ontol-api
    build:
      context: ..
      dockerfile: v2-service/backend/Dockerfile
    command: ['arq', 'app.worker.WorkerSettings']
    environment:
      <<: *backend-env
    healthcheck:
      # arq --check читает health-check ключ воркера в Redis (см. WorkerSettings).
      test: ['CMD', 'arq', 'app.worker.WorkerSettings', '--check']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      plantuml:
        condition: service_started

  web:
    build:
      context: frontend
      dockerfile: Dockerfile
    depends_on:
      - api
    ports:
      - '5173:80'

volumes:
  pgdata:
