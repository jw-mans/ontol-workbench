# Корневой файл — ТОЛЬКО конфигурация инструментов (ruff). Пакеты живут отдельно:
#   src/ontol-v1  — пакет `ontol` (v1), свой pyproject
#   src/ontol-v3  — пакет `uml_dsl` (v3), свой pyproject
# Каждый ставится независимо: `pip install -e src/ontol-v1` / `... -e src/ontol-v3`.

[tool.ruff.lint]
ignore = ['E722']

[tool.ruff.format]
quote-style = 'single'

[tool.ruff]
indent-width = 4
